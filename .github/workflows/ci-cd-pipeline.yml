name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Build Docker image
        run: docker build -t devops-app:${{ github.sha }} -f docker/Dockerfile .

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    # FIX: only deploy on pushes to main, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          # FIX: key comes from GitHub Secrets, not committed to repo
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > /tmp/devops_key.pem
          chmod 400 /tmp/devops_key.pem

      - name: Deploy to EC2
        run: |
          # FIX: EC2_IP and SSH_USER come from GitHub Secrets / vars
          scp -i /tmp/devops_key.pem \
              -o StrictHostKeyChecking=no \
              -r . \
              ${{ vars.EC2_SSH_USER }}@${{ vars.EC2_IP }}:/home/${{ vars.EC2_SSH_USER }}/app/

          ssh -i /tmp/devops_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ vars.EC2_SSH_USER }}@${{ vars.EC2_IP }} \
              "cd /home/${{ vars.EC2_SSH_USER }}/app && bash deploy.sh"

      - name: Clean up key
        if: always()
        run: rm -f /tmp/devops_key.pem
