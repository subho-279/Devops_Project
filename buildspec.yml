version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm install

  pre_build:
    commands:
      - echo "Running linter / tests..."
      - npm test --if-present

  build:
    commands:
      - echo "Building application..."
      - npm run build --if-present

  post_build:
    commands:
      - echo "Build complete."

artifacts:
  files:
    - '**/*'
  # FIX: exclude local dev artifacts from the pipeline artifact
  exclude-paths:
    - node_modules/**
    - .git/**
